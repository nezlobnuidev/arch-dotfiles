$wallpaper = /home/chief/.current_wallpaper
$font = JetBrainsMono Nerd Font
source = /home/chief/.config/hypr/themes/hyprlock-colors.conf

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

background {
    monitor =
    path = $wallpaper
    blur_passes = 2
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = $fg
    font_size = 90
    font_family = $font
    position = -30, 0
    halign = right
    valign = top
}

label {
    monitor =
    text = cmd[update:43200000] date +"%A, %d %B %Y"
    color = $muted
    font_size = 25
    font_family = $font
    position = -30, -150
    halign = right
    valign = top
}

image {
    monitor =
    path = /tmp/hyprlock-cover.png
    size = 150
    reload_time = 2
    reload_cmd = /home/chief/.config/hypr/scripts/hyprlock-media.sh --cover
    position = 0, 0
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = $accent
    inner_color = $panel
    font_color = $field
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    rounding = -1
    check_color = $accent
    fail_color = $danger
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = true
    position = 0, 80
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] /home/chief/.config/hypr/scripts/hyprlock-media.sh --text
    color = $muted
    font_family = $font
    font_size = 16
    position = 0, -130
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] sh -c 'player=$(playerctl -l 2>/dev/null | head -n1); [ -n "$player" ] && echo "󰒮"'
    onclick = sh -c 'player=$(playerctl -l 2>/dev/null | head -n1); [ -n "$player" ] && playerctl -p "$player" previous'
    color = $fg
    font_size = 24
    font_family = $font
    position = -48, -188
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] sh -c 'player=$(playerctl -l 2>/dev/null | head -n1); [ -z "$player" ] && exit 0; state=$(playerctl -p "$player" status 2>/dev/null); [ "$state" = "Playing" ] && echo "⏸" || echo "▶"'
    onclick = sh -c 'player=$(playerctl -l 2>/dev/null | head -n1); [ -n "$player" ] && playerctl -p "$player" play-pause'
    color = $fg
    font_size = 24
    font_family = $font
    position = 0, -188
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] sh -c 'player=$(playerctl -l 2>/dev/null | head -n1); [ -n "$player" ] && echo "󰒭"'
    onclick = sh -c 'player=$(playerctl -l 2>/dev/null | head -n1); [ -n "$player" ] && playerctl -p "$player" next'
    color = $fg
    font_size = 24
    font_family = $font
    position = 48, -188
    halign = center
    valign = center
}

label {
    monitor =
    text = $LAYOUT
    color = $fg
    font_size = 24
    font_family = $font
    position = -2%, 1%
    halign = right
    valign = bottom
}

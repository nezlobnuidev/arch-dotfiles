# Font Configuration
font_family JetBrainsMono Nerd Font Mono
font_size 12.0
bold_font auto
italic_font auto
bold_italic_font auto

scrollback_lines 100000
scrollback_pager_history_size 100

# Window Configuration
window_padding_width 12
background_opacity 1.0
background_blur 32
hide_window_decorations yes
background_opacity 0.80
scrollbar_handle_opacity 0
scrollbar_track_opacity 0
scrollbar_track_hover_opacity 0
confirm_os_window_close

# Cursor Configuration
cursor_shape block
cursor_blink_interval 1
mouse_hide_wait -1.0
repaint_delay 8
input_delay 3
cursor_trail 3

# Terminal features
copy_on_select yes
strip_trailing_spaces smart

# Clipboard shortcuts (Latin layout)
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map super+c copy_to_clipboard
map super+v paste_from_clipboard

# Clipboard shortcuts (Russian layout)
# c -> с, v -> м
map ctrl+shift+с copy_to_clipboard
map ctrl+shift+м paste_from_clipboard
map super+с copy_to_clipboard
map super+м paste_from_clipboard

# Key bindings for common actions
map ctrl+shift+n new_window
map ctrl+t new_tab
map ctrl+plus change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0

# Tab configuration
tab_bar_style powerline
tab_bar_align left

# Shell integration
shell_integration enabled
enable_audio_bell no

# Dank color generation
include dank-tabs.conf
include colors.conf
